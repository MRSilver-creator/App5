<!-- Top navigation header -->
<m-header
  [title]="appTitle"
  homename="Home"
  [features]="navFeatures">
</m-header>

<!-- Page body -->
<m-container>

  <!-- Welcome alert -->
  <m-aha type="success" header="Welcome back!">
    Use the menu below to navigate to any section of the app.
  </m-aha>

  <!-- Quick-stats row -->
  <div class="stats-row">
    <m-result-box
      *ngFor="let stat of stats"
      [label]="stat.label"
      [value]="stat.value"
      class="normal">
    </m-result-box>
  </div>

  <!-- Main navigation menu -->
  <m-main-menu
    [menuitems]="navFeatures"
    (menuclick)="onMenuClick($event)">
  </m-main-menu>

</m-container>
