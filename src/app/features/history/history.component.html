<div class="page-card">
  <h2>📋 Intake History</h2>

  <div class="chart-section" *ngIf="chartData.length">
    <m-timeserieschart [data]="chartData"></m-timeserieschart>
  </div>

  <div class="search-row">
    <input
      type="text"
      [(ngModel)]="searchQuery"
      (ngModelChange)="onSearchChange()"
      placeholder="🔍 Filter by medication name…"
      class="search-input"
    />
    <span class="count-badge">{{ filtered.length }} dose(s)</span>
  </div>

  <div *ngIf="filtered.length === 0" class="empty-state">No doses logged yet.</div>

  <div *ngIf="filtered.length > 0" class="table-wrap">
    <m-table [data]="tableRows"></m-table>
  </div>

  <div class="legend">Latest logged dose is marked in the table dataset.</div>
</div>
