<div class="page-header">
  <h2>📋 Intake History</h2>
  <input
    type="text"
    [(ngModel)]="searchTerm"
    placeholder="Search by medication name…"
    class="search-input"
  />
</div>

<!-- 7-Day chart using M-Framework m-timeserieschart -->
<div class="chart-box">
  <m-timeserieschart
    [data]="chartData"
    label="Doses per Day"
    color="#7c8fff"
    [min]="0"
    unit="Doses">
  </m-timeserieschart>
</div>

<p *ngIf="tableRows.length === 0" class="empty-msg">No doses logged yet.</p>

<!-- History table using M-Framework m-table with filter -->
<div class="table-wrap" *ngIf="tableRows.length > 0">
  <m-table
    [data]="tableRows"
    [filterTerm]="searchTerm"
    [columnsToBeDisplayed]="tableColumns"
    [tableHeaders]="tableHeaders">
  </m-table>
</div>

<div class="legend" *ngIf="tableRows.length > 0">
  <span class="legend-dot"></span> Most recently logged dose
</div>
