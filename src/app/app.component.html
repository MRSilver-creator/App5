<!-- Disclaimer banner (Assignment requirement) -->
<div class="disclaimer">
  ⚠️ <strong>Educational use only.</strong> PillSnap is not a diagnostic or medical advice tool.
  Always verify with a pharmacist or doctor.
</div>

<!-- m-framework header (visible on every page) -->
<m-header
  [title]="appTitle"
  homename="Home"
  [features]="navFeatures">
</m-header>

<!-- m-framework container wraps the whole page body -->
<m-container>

  <!-- Welcome alert (visible on every page) -->
  <m-aha type="success" header="Welcome back!">
    Use the menu below to navigate to any section of the app.
  </m-aha>

  <!-- Quick-stats row (visible on every page) -->
  <div class="stats-row">
    <m-result-box
      *ngFor="let stat of stats"
      [label]="stat.label"
      [value]="stat.value"
      class="normal">
    </m-result-box>
  </div>

  <!-- m-framework side menu (visible on every page) -->
  <m-main-menu
    [menuitems]="navFeatures"
    (menuclick)="onMenuClick($event)">
  </m-main-menu>

  <!-- Routed page content goes here -->
  <main class="main-content">
    <router-outlet />
  </main>

</m-container>

<!-- Footer -->
<footer class="footer">
  <div class="footer-inner">
    <img
      src="assets/university-logo.png"
      alt="University Logo"
      class="footer-logo"
      onerror="this.style.display='none'"
    />
    <div class="footer-text">
      <span class="footer-credit">Designed by: <strong>Wassim Saad</strong></span>
      <span class="footer-course">CEN333 / BME433 &mdash; Cross-Platform Mobile Application Development</span>
    </div>
  </div>
</footer>
